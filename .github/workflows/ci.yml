name: Skill-E CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-rust:
    name: Rust Check & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "Skill-E/skill-e/src-tauri -> target"

      - name: Check Format
        run: cargo fmt -- --check
        working-directory: Skill-E/skill-e/src-tauri
        continue-on-error: true

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: Skill-E/skill-e/src-tauri
        continue-on-error: true

      - name: Run Tests
        run: cargo test
        working-directory: Skill-E/skill-e/src-tauri

  test-frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: Skill-E/skill-e/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install
        working-directory: Skill-E/skill-e

      - name: Lint
        run: pnpm run lint
        working-directory: Skill-E/skill-e
        continue-on-error: true

      - name: Type Check
        run: npx tsc --noEmit
        working-directory: Skill-E/skill-e
        continue-on-error: true

      - name: Run Tests
        run: pnpm test
        working-directory: Skill-E/skill-e

  build-tauri:
    name: Build Tauri (Windows)
    needs: [test-rust, test-frontend]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: Skill-E/skill-e/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install
        working-directory: Skill-E/skill-e

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "Skill-E/skill-e/src-tauri -> target"

      - name: Build Application
        run: pnpm run build
        working-directory: Skill-E/skill-e

      - name: Build Tauri
        run: pnpm tauri build
        working-directory: Skill-E/skill-e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: skille-windows-installer
          path: Skill-E/skill-e/src-tauri/target/release/bundle/msi/*.msi
